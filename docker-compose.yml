services:
  postgres:
    image: postgres:15-alpine
    container_name: hr-copilot-postgres
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hr-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: hr-copilot-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: hr-copilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  candidate-service:
    build:
      context: .
      dockerfile: services/candidate-service/Dockerfile
    container_name: hr-copilot-candidate-service
    ports:
      - "8000:8000"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/candidate-service:/workspace/services/candidate-service
    environment:
      - ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  interview-engine:
    build:
      context: .
      dockerfile: services/interview-engine/Dockerfile
    container_name: hr-copilot-interview-engine
    ports:
      - "8003:8003"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/interview-engine:/workspace/services/interview-engine
    environment:
      - ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  grading-service:
    build:
      context: .
      dockerfile: services/grading-service/Dockerfile
    container_name: hr-copilot-grading-service
    ports:
      - "8002:8002"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/grading-service:/workspace/services/grading-service
    environment:
      - ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sandbox-runner:
    build:
      context: ./services/sandbox-runner
      dockerfile: Dockerfile
    container_name: hr-copilot-sandbox-runner
    ports:
      - "8001:8001"
    volumes:
      - ./services/sandbox-runner:/app/services/sandbox-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:
