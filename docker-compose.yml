services:
  postgres:
    image: postgres:15-alpine
    container_name: hr-copilot-postgres
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hr-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: hr-copilot-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: hr-copilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  candidate-service:
    build:
      context: .
      dockerfile: services/candidate-service/Dockerfile
    container_name: hr-copilot-candidate-service
    ports:
      - "8000:8000"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/candidate-service:/workspace/services/candidate-service
    environment:
      - ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  interview-engine:
    build:
      context: .
      dockerfile: services/interview-engine/Dockerfile
    container_name: hr-copilot-interview-engine
    ports:
      - "8003:8003"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/interview-engine:/workspace/services/interview-engine
    environment:
      - ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  grading-service:
    build:
      context: .
      dockerfile: services/grading-service/Dockerfile
    container_name: hr-copilot-grading-service
    ports:
      - "8002:8002"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/grading-service:/workspace/services/grading-service
    environment:
      - ENV=development
      - DEBUG=True
      - DATABASE_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sandbox-runner:
    build:
      context: ./services/sandbox-runner
      dockerfile: Dockerfile
    container_name: hr-copilot-sandbox-runner
    ports:
      - "8001:8001"
    volumes:
      - ./services/sandbox-runner:/app/services/sandbox-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  feature-platform:
    build:
      context: .
      dockerfile: services/feature-platform/Dockerfile
    container_name: hr-copilot-feature-platform
    ports:
      - "8004:8004"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/feature-platform:/workspace/services/feature-platform
    environment:
      - ENV=development
      - DEBUG=True
      - POSTGRES_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - KAFKA_BROKER_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mlops-platform:
    build:
      context: .
      dockerfile: services/mlops-platform/Dockerfile
    container_name: hr-copilot-mlops-platform
    ports:
      - "8005:8005"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/mlops-platform:/workspace/services/mlops-platform
    environment:
      - ENV=development
      - DEBUG=True
      - POSTGRES_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - KAFKA_BROKER_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  observability-platform:
    build:
      context: .
      dockerfile: services/observability-platform/Dockerfile
    container_name: hr-copilot-observability-platform
    ports:
      - "8006:8006"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/observability-platform:/workspace/services/observability-platform
    environment:
      - ENV=development
      - DEBUG=True
      - POSTGRES_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - KAFKA_BROKER_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  recruiter-platform:
    build:
      context: .
      dockerfile: services/recruiter-platform/Dockerfile
    container_name: hr-copilot-recruiter-platform
    ports:
      - "8007:8007"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/recruiter-platform:/workspace/services/recruiter-platform
    environment:
      - ENV=development
      - DEBUG=True
      - POSTGRES_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - KAFKA_BROKER_URL=kafka:9092
      - QDRANT_URL=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy

  candidate-platform:
    build:
      context: .
      dockerfile: services/candidate-platform/Dockerfile
    container_name: hr-copilot-candidate-platform
    ports:
      - "8008:8008"
    volumes:
      - ./services/common:/workspace/services/common
      - ./services/candidate-platform:/workspace/services/candidate-platform
    environment:
      - ENV=development
      - DEBUG=True
      - POSTGRES_URL=postgresql://hr_user:hr_password@postgres:5432/hr_copilot
      - KAFKA_BROKER_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    container_name: hr-copilot-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-create-buckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/resumes --ignore-existing;
      mc mb myminio/recordings --ignore-existing;
      mc mb myminio/whiteboards --ignore-existing;
      mc policy set public myminio/resumes;
      exit 0;
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: hr-copilot-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: hr-copilot-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:
  minio_data:
  elasticsearch_data:
  kafka_data:
